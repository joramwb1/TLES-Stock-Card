<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanzang Luma ES - Stock Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo-container">
            <img src="tles.png" alt="TLES Logo" class="school-logo">
            <div class="logo-text">
                <span class="school-name">Tanzang Luma Elementary School</span>
                <span class="app-name">Inventory Beta</span>
            </div>
        </div>
        <div class="nav-links">
            <button onclick="showView('dashboard')" class="nav-btn">Dashboard</button>
            <button onclick="showView('history')" class="nav-btn">Logs</button>
        </div>
    </nav>

    <div class="container">
        <section id="view-dashboard" class="view">
            <div class="header-row">
                <h2>Stock Overview</h2>
                <div style="display: flex; gap: 10px;">
                    <button onclick="showView('add-stock')" class="btn-primary">+ New Entry</button>
                    <button onclick="showView('issue-stock')" class="btn-issue">- Release Item</button>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <span class="label">ITEM CATEGORIES</span>
                    <span id="stat-total-items" class="value">0</span>
                </div>
                <div class="stat-card">
                    <span id="stat-total-units" class="value" style="float:right;">0</span>
                    <span class="label">TOTAL PIECES/REAMS</span>
                </div>
            </div>

            <div class="main-layout">
                <div class="inventory-content card">
                    <div class="table-header">
                        <h3>Current Inventory</h3>
                        <input type="text" id="inventory-search" placeholder="🔍 Search stockroom...">
                    </div>
                    <table id="inventory-table">
                        <thead>
                            <tr>
                                <th>ITEM NAME</th>
                                <th>SPECIFICATION</th>
                                <th>QUANTITY</th>
                                <th>ACTION</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>

                <aside class="activity-sidebar card">
                    <h3>Recent Activity</h3>
                    <div id="activity-feed"></div>
                </aside>
            </div>
        </section>

        </div>
    
    <script src="script.js"></script>
</body>
</html>
