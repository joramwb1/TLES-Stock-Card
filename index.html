<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TLES | Stockroom</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-shell">
        <nav class="sidebar">
            <div class="sidebar-header">
                <img src="tles.png" alt="TLES" class="logo-img">
                <div class="logo-text">
                    <h1>TLES</h1>
                    <p>Inventory System</p>
                </div>
            </div>
            <div class="sidebar-menu">
                <button onclick="showView('dashboard')" class="menu-item active" id="btn-dash">📊 Dashboard</button>
                <button onclick="showView('history')" class="menu-item" id="btn-logs">📋 Audit Logs</button>
            </div>
            <div class="sidebar-footer">
                <button onclick="resetDatabase()" class="reset-link">Reset Database</button>
            </div>
        </nav>

        <main class="main-content">
            <section id="view-dashboard" class="view">
                <header class="content-header">
                    <div>
                        <h2>Stockroom Overview</h2>
                        <p id="current-date"></p>
                    </div>
                    <div class="header-actions">
                        <button onclick="downloadInventoryCSV()" class="btn-secondary">Export List</button>
                        <button onclick="showView('add-stock')" class="btn-primary">+ New Item</button>
                        <button onclick="showView('issue-stock')" class="btn-accent">- Issue Stock</button>
                    </div>
                </header>

                <div class="dashboard-grid">
                    <div class="inventory-card card">
                        <div class="card-header">
                            <div class="search-box">
                                <input type="text" id="inventory-search" placeholder="Search by name or specs...">
                            </div>
                            <select id="filter-category" onchange="updateUI()">
                                <option value="All">All Categories</option>
                                <option value="Office Supplies">Office Supplies</option>
                                <option value="Janitorial">Janitorial</option>
                                <option value="IT Equipment">IT Equipment</option>
                                <option value="Others">Others</option>
                            </select>
                        </div>
                        <div class="table-wrapper">
                            <table id="inventory-table">
                                <thead>
                                    <tr>
                                        <th onclick="sortTable('name')">Item Details</th>
                                        <th>Category</th>
                                        <th onclick="sortTable('qty')">Stock Level</th>
                                        <th style="text-align: right;">Manage</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr><td colspan="4" class="loading">Connecting to Cloud...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <aside class="activity-card card">
                        <h3>Live Feed</h3>
                        <div id="activity-feed" class="feed-container"></div>
                    </aside>
                </div>
            </section>

            <section id="view-add-stock" class="view" style="display:none;">
                <div class="form-container card">
                    <button onclick="showView('dashboard')" class="back-btn">← Back to Overview</button>
                    <h2 id="add-view-title">Register New Item</h2>
                    <form id="item-form">
                        <input type="hidden" id="edit-id">
                        <div class="form-row">
                            <div class="form-group"><label>Item Name</label><input type="text" id="item-name" placeholder="e.g. Bond Paper" required></div>
                            <div class="form-group"><label>Category</label>
                                <select id="item-category">
                                    <option value="Office Supplies">Office Supplies</option>
                                    <option value="Janitorial">Janitorial</option>
                                    <option value="IT Equipment">IT Equipment</option>
                                    <option value="Others">Others</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group"><label>Specification</label><input type="text" id="item-spec" placeholder="e.g. A4, 70gsm" required></div>
                            <div class="form-group"><label>UOM (Unit)</label><input type="text" id="item-unit" placeholder="Reams, Pcs, Boxes" required></div>
                        </div>
                        <div class="form-row">
                            <div class="form-group"><label>Current Qty</label><input type="number" id="item-qty" required></div>
                            <div class="form-group"><label>Alert Threshold</label><input type="number" id="item-min" value="5" required></div>
                        </div>
                        <button type="submit" class="btn-primary full">Save Item to Inventory</button>
                    </form>
                </div>
            </section>

            <section id="view-history" class="view" style="display:none;">
                <header class="content-header">
                    <h2>Audit Logs</h2>
                    <button onclick="downloadLogCSV()" class="btn-primary">Download CSV Report</button>
                </header>
                <div class="card">
                    <table id="history-table">
                        <thead><tr><th>Timestamp</th><th>Action Taken</th><th>Personnel/Recipient</th><th>Reason/Purpose</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </section>

            <section id="view-issue-stock" class="view" style="display:none;">
                <div class="form-container card">
                    <button onclick="showView('dashboard')" class="back-btn">← Back</button>
                    <h2>Issue Item</h2>
                    <form id="issue-form">
                        <div class="form-group"><label>Select Item
